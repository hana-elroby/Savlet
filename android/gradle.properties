org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.workers.max=2
org.gradle.caching=true
android.useAndroidX=true
android.enableJetifier=true
# Project on D: + pub cache on C: breaks Kotlin incremental compilation on Windows
kotlin.incremental=false
# Out-of-process avoids Metaspace exhaustion when many plugins compile together
kotlin.compiler.execution.strategy=out-of-process
